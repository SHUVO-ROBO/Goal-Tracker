<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">

  <defs>

    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

  </defs>

  <!-- Background -->

  <rect width="256" height="256" rx="68" fill="#020617"/>

  <!-- Outer Orbit -->

  <circle
    cx="128"
    cy="128"
    r="92"
    stroke="url(#grad)"
    stroke-width="2"
    stroke-dasharray="8 12"
    opacity=".45"
    fill="none">

    <animateTransform
      attributeName="transform"
      type="rotate"
      from="0 128 128"
      to="360 128 128"
      dur="18s"
      repeatCount="indefinite"/>

  </circle>

  <!-- Inner Ring -->

  <circle
    cx="128"
    cy="128"
    r="72"
    stroke="rgba(255,255,255,.08)"
    stroke-width="1"
    fill="none"/>

  <!-- Glow -->

  <circle
    cx="128"
    cy="128"
    r="58"
    fill="url(#grad)"
    opacity=".12">

    <animate
      attributeName="opacity"
      values=".10;.22;.10"
      dur="4s"
      repeatCount="indefinite"/>

  </circle>

  <!-- Progress Bars -->

  <rect x="82" y="145" width="18" height="34" rx="5"
        fill="url(#grad)" opacity=".85"/>

  <rect x="110" y="126" width="18" height="53" rx="5"
        fill="url(#grad)"/>

  <rect x="138" y="102" width="18" height="77" rx="5"
        fill="url(#grad)"/>

  <!-- Check -->

  <path
    d="M78 124
       L110 154
       L178 88"
    stroke="url(#grad)"
    stroke-width="13"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
    filter="url(#glow)">

    <animate
      attributeName="stroke-dasharray"
      values="0,260;260,0"
      dur="1.6s"
      fill="freeze"/>

  </path>

  <!-- Accent Dot -->

  <circle cx="188" cy="76" r="5" fill="#06B6D4">

    <animate
      attributeName="r"
      values="5;7;5"
      dur="3s"
      repeatCount="indefinite"/>

    <animate
      attributeName="opacity"
      values="1;.35;1"
      dur="3s"
      repeatCount="indefinite"/>

  </circle>

</svg>
