<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">

  <defs>

    <!-- Emerald Gradient -->
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#34D399"/>
    </linearGradient>

    <!-- Glow -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Shadow -->
    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity=".45"/>
    </filter>

  </defs>

  <!-- Background -->
  <rect width="256" height="256" rx="72" fill="#020617"/>

  <!-- Animated Outer Orbit -->
  <circle
      cx="128"
      cy="128"
      r="94"
      stroke="url(#grad)"
      stroke-width="2"
      stroke-dasharray="9 10"
      opacity=".55"
      fill="none">

      <animateTransform
          attributeName="transform"
          type="rotate"
          from="0 128 128"
          to="360 128 128"
          dur="18s"
          repeatCount="indefinite"/>

  </circle>

  <!-- Progress Ring -->
  <circle
      cx="128"
      cy="128"
      r="73"
      stroke="#1E293B"
      stroke-width="8"
      fill="none"/>

  <circle
      cx="128"
      cy="128"
      r="73"
      stroke="url(#grad)"
      stroke-width="8"
      stroke-linecap="round"
      stroke-dasharray="340"
      stroke-dashoffset="95"
      fill="none"
      filter="url(#glow)">

      <animate
          attributeName="stroke-dashoffset"
          values="120;90;120"
          dur="4s"
          repeatCount="indefinite"/>

  </circle>

  <!-- Glass Center -->
  <circle
      cx="128"
      cy="128"
      r="52"
      fill="#0F172A"
      filter="url(#shadow)"/>

  <circle
      cx="128"
      cy="128"
      r="50"
      fill="url(#grad)"
      opacity=".08"/>

  <!-- Check -->
  <path
      d="
      M100 130
      L121 151
      L160 108"
      stroke="url(#grad)"
      stroke-width="13"
      stroke-linecap="round"
      stroke-linejoin="round"
      fill="none"
      filter="url(#glow)">

      <animate
          attributeName="stroke-opacity"
          values="1;.6;1"
          dur="2.8s"
          repeatCount="indefinite"/>

  </path>

  <!-- Progress Bars -->
  <rect x="82" y="178" width="18" height="24" rx="5" fill="url(#grad)" opacity=".55"/>
  <rect x="111" y="166" width="18" height="36" rx="5" fill="url(#grad)" opacity=".8"/>
  <rect x="140" y="148" width="18" height="54" rx="5" fill="url(#grad)"/>

  <!-- AI Pulse -->
  <circle cx="188" cy="72" r="5" fill="#34D399">

      <animate
          attributeName="r"
          values="5;9;5"
          dur="3s"
          repeatCount="indefinite"/>

      <animate
          attributeName="opacity"
          values="1;.25;1"
          dur="3s"
          repeatCount="indefinite"/>

  </circle>

</svg>
